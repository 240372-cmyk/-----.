<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой статус</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔑 ТВОИ ДАННЫЕ
    const URL = "https://kprqdzvhtvhzzxgichzg.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwcnFkenZodHZoenp4Z2ljaHpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MjUyMTQsImV4cCI6MjA5MTIwMTIxNH0.ST_I3cjoCOyhIDjWgwJLcn0a13-Pw_qaS5tZo2do_lY"; // ⚠️ возможно неправильный!

    const supabase = createClient(URL, KEY);

    const MY_ID = "980eb134-099b-43a8-8375-4b8386ee56d0";

    // смена статуса
    window.setStatus = async (status) => {
      const { data, error } = await supabase
        .from("profiles")
        .update({ status: status })
        .eq("id", MY_ID);

      console.log("DATA:", data);
      console.log("ERROR:", error);

      loadMe();
    };

    // загрузка профиля
    async function loadMe() {
      const { data, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", MY_ID)
        .single();

      console.log("LOAD:", data, error);

      if (data) {
        document.getElementById("name").textContent = data.username;
        document.getElementById("status").textContent = data.status;
      }
    }

    window.onload = loadMe;
  </script>
</head>
<body>

  <h2>Мой профиль</h2>

  <p>Имя: <b id="name"></b></p>
  <p>Статус: <b id="status"></b></p>

  <button onclick="setStatus('online')">🟢 Онлайн</button>
  <button onclick="setStatus('busy')">🟡 Занят</button>
  <button onclick="setStatus('offline')">⚪ Оффлайн</button>

</body>
</html>
